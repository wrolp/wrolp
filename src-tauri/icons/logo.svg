<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3a"/>
      <stop offset="100%" stop-color="#0f0f28"/>
    </linearGradient>
    <linearGradient id="gridGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- 外部圆环 -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gridGrad)" stroke-width="10" opacity="0.9"/>

  <!-- 地球经线 -->
  <ellipse cx="256" cy="256" rx="220" ry="220" fill="none" stroke="url(#gridGrad)" stroke-width="7" opacity="0.7"/>
  <ellipse cx="256" cy="256" rx="140" ry="220" fill="none" stroke="url(#gridGrad)" stroke-width="7" opacity="0.7"/>
  <ellipse cx="256" cy="256" rx="50" ry="220" fill="none" stroke="url(#gridGrad)" stroke-width="7" opacity="0.7"/>

  <!-- 地球纬线 -->
  <ellipse cx="256" cy="256" rx="220" ry="140" fill="none" stroke="url(#gridGrad)" stroke-width="7" opacity="0.7"/>
  <ellipse cx="256" cy="256" rx="220" ry="50" fill="none" stroke="url(#gridGrad)" stroke-width="7" opacity="0.7"/>

  <!-- 左侧绿色弧线 -->
  <path d="M30,256 Q30,100 120,30" fill="none" stroke="url(#accentGrad)" stroke-width="20" stroke-linecap="round"/>
  <path d="M54,262 Q54,120 110,60" fill="none" stroke="url(#accentGrad)" stroke-width="16" stroke-linecap="round" opacity="0.6"/>

  <!-- 右侧绿色圆点 -->
  <circle cx="452" cy="256" r="38" fill="url(#accentGrad)"/>

  <!-- 中心 WL -->
  <text x="256" y="284" text-anchor="middle" font-family="'Fira Code', Consolas, monospace" font-size="215" font-weight="700" fill="#ffffff" dominant-baseline="central" letter-spacing="4" opacity="0.95">WL</text>
</svg>
